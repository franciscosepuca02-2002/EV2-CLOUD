services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: frontend

    ports:
      - "4200:4200"

    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: backend

    ports:
      - "8000:8000"

    depends_on:
      - mysql
      - app-pagos

  mysql:
    image: mysql:8.0

    container_name: mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tienda_cloud

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  app-pagos:
    build:
      context: ./app-pagos
      dockerfile: Dockerfile

    container_name: app-pagos

    environment:
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY}
      MP_WEBHOOK_URL: ${MP_WEBHOOK_URL}
      MP_SUCCESS_URL: ${MP_SUCCESS_URL}
      MP_FAILURE_URL: ${MP_FAILURE_URL}
      MP_PENDING_URL: ${MP_PENDING_URL}

    ports:
      - "8002:8002"

    restart: unless-stopped

volumes:
  mysql_data: