<div class="row">
    <div class="col-md-4 mb-3" *ngFor="let producto of productos">
        <div class="card p-3">
        <h4>{{ producto.nombre }}</h4>

        <p>${{ producto.precio }}</p>

        <button class="btn btn-primary" (click)="agregarCarrito(producto)">Agregar</button>
        </div>
    </div>
</div>
